program: scripts/train.py
method: bayes
metric:
  name: eval/p_at_1
  goal: maximize

parameters:
  optimizer.base_lr:
    values: [1.0e-5, 2.0e-5, 5.0e-5]
  regularization.lambda_reg:
    values: [0.0, 0.01, 0.1, 1.0]
  alignment.scorer:
    values: ["procrustes", "cosine", "cka"]
  alignment.update_freq:
    values: [100, 500, 2000]
  loss.temperature:
    values: [0.05, 0.07, 0.1, 0.2]
  alignment.scheduler_temperature:
    values: [0.5, 1.0, 2.0]
